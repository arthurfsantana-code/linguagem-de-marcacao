<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de tarefas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section>
      <article class="tarefa">
        <header>
          <span class="medalha">Trabalho</span>
          <span class="medalha">Urgente</span>
          <button class="excluir" aria-label="Excluir tarefa">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
              viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </header>
        <div class="corpo">
          <h2>Anotações da reunião</h2>
          <p>Discuss project milestones for the upcoming Q4 product launch
             and sync with the engineering team on resource allocation.</p>
        </div>
        <footer>
          <div class="usuarios">
            <span class="usuario"></span>
            <span class="usuario"></span>
          </div>
          <span class="publicacao">Criado 2h atrás</span>
        </footer>
      </article>
    </section>
  </main>
</body>
</html>
